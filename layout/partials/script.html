<script type="module">
import hljs from 'https://unpkg.com/@highlightjs/cdn-assets@11.11.1/es/highlight.min.js';

document.querySelectorAll('pre code').forEach(element => {
  hljs.highlightElement(element);
});
</script>
<script type="module">
import AffiliateLink from '/js/affiliate-link.js';

customElements.define('affiliate-link', AffiliateLink);

const autoPhrase = document.querySelector('#auto-phrase');
const darkMode =  document.querySelector('#dark-mode');
const rainbowLink =  document.querySelector('#rainbow-link');
const translation = document.querySelector('#translation');
const targetLanguage = new Intl.Locale(navigator.language).language;

autoPhrase.checked = localStorage.getItem('auto-phrase');
darkMode.checked = localStorage.getItem('dark-mode');
rainbowLink.checked = localStorage.getItem('rainbow-link');

autoPhrase?.addEventListener('change', event => {
  if (event.target.checked) {
    localStorage.setItem('auto-phrase', true);
  } else {
    localStorage.removeItem('auto-phrase');
  }
});

darkMode?.addEventListener('change', event => {
  if (event.target.checked) {
    localStorage.setItem('dark-mode', true);
  } else {
    localStorage.removeItem('dark-mode');
  }
});

rainbowLink?.addEventListener('change', event => {
  if (event.target.checked) {
    localStorage.setItem('rainbow-link', true);
  } else {
    localStorage.removeItem('rainbow-link');
  }
});

const originalTexts = new Map();
let translator = null;

function getTextNodes() {
  const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      if (node.nodeValue.trim() === '') {
        return NodeFilter.FILTER_REJECT;
      }

      if (node.parentElement?.closest('pre, code, script, style')) {
        return NodeFilter.FILTER_REJECT;
      }

      return NodeFilter.FILTER_ACCEPT;
    }
  });

  const nodes = [];

  while (walker.nextNode()) {
    nodes.push(walker.currentNode);
  }

  return nodes;
}

async function translatePage() {
  translator ??= await Translator.create({
    sourceLanguage: 'ja',
    targetLanguage
  });

  for (const node of getTextNodes()) {
    if (!originalTexts.has(node)) {
      originalTexts.set(node, node.nodeValue);
    }

    node.nodeValue = await translator.translate(originalTexts.get(node));
  }

  document.documentElement.lang = targetLanguage;
}

function restorePage() {
  for (const [node, text] of originalTexts) {
    node.nodeValue = text;
  }

  document.documentElement.lang = 'ja';
}

if (!('Translator' in self) || targetLanguage === 'ja') {
  translation.disabled = true;
} else {
  Translator.availability({
    sourceLanguage: 'ja',
    targetLanguage
  }).then(availability => {
    if (availability === 'unavailable') {
      translation.disabled = true;
      return;
    }

    translation.checked = localStorage.getItem('translation');

    if (translation.checked) {
      translatePage().catch(() => {
        translation.checked = false;
        localStorage.removeItem('translation');
      });
    }
  });
}

translation?.addEventListener('change', async event => {
  translation.disabled = true;

  try {
    if (event.target.checked) {
      await translatePage();
      localStorage.setItem('translation', true);
    } else {
      restorePage();
      localStorage.removeItem('translation');
    }
  } catch {
    translation.checked = false;
    restorePage();
    localStorage.removeItem('translation');
  } finally {
    translation.disabled = false;
  }
});

const shareButton = document.querySelector('#share-button');
shareButton?.addEventListener('click', async event => {
  event.preventDefault();

  const data = {
    title: document.title,
    text: document.title,
    url: location.href
  };

  if (navigator.canShare?.(data)) {
    await navigator.share(data);
  } else {
    await navigator.clipboard?.writeText(`${data.title} ${data.url}`);
    const popover = document.querySelector('#Popover');
    popover.showPopover();

    setTimeout(() => {
      popover.hidePopover();
    }, 2000);
  }
});
</script>
